unbind-key -a -T root

set -g pane-border-lines double

set -g base-index 1
setw -g pane-base-index 1

setw -g mode-keys vi

set -g mouse on

set -s escape-time 0

set -g history-limit 2000

bind -n S-r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"
bind -n S-s choose-tree -s

bind -n S-1 select-window -t 1
bind -n S-2 select-window -t 2
bind -n S-3 select-window -t 3
bind -n S-4 select-window -t 4
bind -n S-5 select-window -t 5
bind -n S-6 select-window -t 6
bind -n S-7 select-window -t 7
bind -n S-8 select-window -t 8
bind -n S-9 select-window -t 9

bind -n S-Left select-pane -L
bind -n S-Right select-pane -R
bind -n S-Up select-pane -U
bind -n S-Down select-pane -D

bind -n S-h split-window -v
bind -n S-v split-window -h

bind -n S-Enter new-window
bind -n S-c kill-pane
bind -n S-q split-window
bind -n S-d detach


